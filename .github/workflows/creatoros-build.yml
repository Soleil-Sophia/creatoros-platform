name: CreatorOS Build

on:
  pull_request:
    branches:
      - main
      - architecture/creatoros-os-family-migration
      - feat/creatoros-next-best-content-action-core
      - feat/creatoros-visible-recommendation-slice
      - feat/creatoros-recommendation-generator-handoff
      - feat/creatoros-contextual-guide-layer
      - feat/decision-engine-v1
      - feat/decision-engine-brandos-canonical-apply
      - feat/decision-history-brandos-revisions
      - feat/decision-implementation-observation
      - feat/intelligenceos-learning-recommendations
      - feat/intelligenceos-pattern-aggregation
      - feat/decisionos-functional-overview
      - feat/decisionos-operational-metadata
      - feat/decisionos-decision-detail
      - feat/decisionos-dependencies
      - feat/decisionos-dependency-work-sync
      - feat/decisionos-attention-center
      - feat/decisionos-attention-state
      - feat/decisionos-daily-focus
      - feat/decisionos-human-focus-plan
      - feat/decisionos-focus-execution
      - feat/decisionos-focus-history
      - feat/intelligenceos-focus-learning
      - feat/decisionos-focus-experiments
      - feat/decisionos-focus-experiment-measurement
      - feat/intelligenceos-focus-experiment-recommendations
      - feat/decisionos-focus-scoring-controlled-apply
      - feat/decisionos-focus-scoring-post-apply-monitoring
      - feat/decisionos-scoring-governance-ledger
      - feat/decisionos-scoring-governance-alerts
      - feat/decisionos-scoring-governance-review-cadence
      - feat/decisionos-scoring-review-followup-recommendations
      - feat/decisionos-scoring-followup-resolution-tracking
      - feat/decisionos-scoring-resolution-evidence-verification
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: creatoros-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CreatorOS
        run: pnpm build